name: Build APK

# Se ejecuta al hacer push y tambien manualmente desde la pestana Actions
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    # Permite crear el Release con el APK
    permissions:
      contents: write
    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Permisos de escritura para el contenedor
        # El usuario dentro de la imagen (uid 1000) necesita poder escribir
        # .buildozer y bin/ en el directorio montado.
        run: |
          mkdir -p bin
          chmod -R a+rwx .

      - name: Compilar APK con la imagen oficial kivy/buildozer
        # La imagen trae un toolchain probado (evita el error de libffi de
        # autoconf 2.72). 'yes |' + '-i' acepta licencias del SDK sin colgarse.
        run: |
          yes | docker run --rm -i \
            -v "${{ github.workspace }}":/home/user/hostcwd \
            kivy/buildozer:latest -v android debug

      - name: Recuperar permisos
        if: always()
        run: sudo chown -R $(id -u):$(id -g) . || true

      - name: Subir el APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: contabilidad-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Publicar el APK como Release (descarga directa y reanudable)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0
          name: Area de Contabilidad v1.0
          body: APK de la app "Area de Contabilidad" (lista de compras tipo Excel). Descarga directa del .apk abajo.
          files: bin/*.apk
