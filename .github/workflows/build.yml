name: Build APK

# Se ejecuta al hacer push y tambien manualmente desde la pestana Actions
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    # Ubuntu 22.04 trae autoconf 2.71 (24.04 trae 2.72 y rompe la receta de libffi)
    runs-on: ubuntu-22.04
    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf automake libtool libtool-bin autopoint gettext m4 \
            pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev \
            build-essential ccache

      - name: Instalar buildozer y cython
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.36

      - name: Compilar APK (debug)
        # 'yes |' acepta automaticamente las licencias del SDK de Android
        run: yes | buildozer android debug

      - name: Subir el APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: contabilidad-apk
          path: bin/*.apk
          if-no-files-found: error
